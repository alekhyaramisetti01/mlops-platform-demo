apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-ml-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-ml-api
  template:
    metadata:
      labels:
        app: fraud-ml-api
    spec:
      containers:
      - name: fraud-ml-api
        image: fraud-ml-api:latest
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"